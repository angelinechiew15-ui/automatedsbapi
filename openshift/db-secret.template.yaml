# OpenShift Secret holding the Oracle connection strings for AutomatedSb.Api.
#
# DO NOT commit real passwords. This is a TEMPLATE:
#   1. Copy it:        cp db-secret.template.yaml db-secret.yaml
#   2. Fill the values under stringData (db-secret.yaml is gitignored).
#   3. Apply it:       oc apply -f db-secret.yaml
#
# Alternatively, create it imperatively (nothing stored on disk):
#   oc create secret generic automatedsbapi-db \
#     --from-literal=ConnectionStrings__Oracle='...' \
#     --from-literal=ConnectionStrings__OracleREALIS='...'
#
# Or reuse local .NET user-secrets via openshift/sync-db-secret.ps1.
#
# Note: the keys use the .NET environment-variable convention where a double
# underscore (__) maps to a configuration section separator (:), so
# ConnectionStrings__Oracle is read by config.GetConnectionString("Oracle").
apiVersion: v1
kind: Secret
metadata:
  name: automatedsbapi-db
  labels:
    app: automatedsbapi-git
type: Opaque
stringData:
  ConnectionStrings__Oracle: "Data Source=<host>;User Id=<user>;Password=<password>;"
  ConnectionStrings__OracleREALIS: "Data Source=<host>;User Id=<user>;Password=<password>;"
